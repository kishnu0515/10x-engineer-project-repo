version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: promptlab-backend
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    # Hot reload for development: mount source and override command
    volumes:
      - ./backend:/app
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
